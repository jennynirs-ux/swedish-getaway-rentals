<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nordic Getaways - Premium Nordic Vacation Rentals</title>
    <meta name="description" content="Discover your perfect Nordic retreat. Unique vacation rentals across Sweden, Norway, Finland, and Denmark with modern amenities, breathtaking views, and authentic Scandinavian experiences.">
    <link rel="canonical" href="https://nordic-getaways.com/" />
    <meta name="author" content="Nordic Getaways" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2D5F5D" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nordic Getaways" />
    <meta property="og:title" content="Nordic Getaways - Premium Nordic Vacation Rentals" />
    <meta property="og:description" content="Discover your perfect Nordic retreat. Unique vacation rentals across Sweden, Norway, Finland, and Denmark with modern amenities, breathtaking views, and authentic Scandinavian experiences." />
    <meta property="og:url" content="https://nordic-getaways.com/" />
    <meta property="og:image" content="https://nordic-getaways.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="sv_SE" />
    <meta property="og:locale:alternate" content="nb_NO" />
    <meta property="og:locale:alternate" content="da_DK" />
    <meta property="og:locale:alternate" content="fi_FI" />
    <meta property="og:locale:alternate" content="de_DE" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nordic Getaways - Premium Nordic Vacation Rentals" />
    <meta name="twitter:description" content="Discover your perfect Nordic retreat. Unique vacation rentals across Scandinavia." />
    <meta name="twitter:image" content="https://nordic-getaways.com/og-image.jpg" />

    <!-- Hreflang tags for multi-language SEO -->
    <link rel="alternate" hreflang="en" href="https://nordic-getaways.com/" />
    <link rel="alternate" hreflang="sv" href="https://nordic-getaways.com/?lang=sv" />
    <link rel="alternate" hreflang="no" href="https://nordic-getaways.com/?lang=no" />
    <link rel="alternate" hreflang="da" href="https://nordic-getaways.com/?lang=da" />
    <link rel="alternate" hreflang="fi" href="https://nordic-getaways.com/?lang=fi" />
    <link rel="alternate" hreflang="de" href="https://nordic-getaways.com/?lang=de" />
    <link rel="alternate" hreflang="x-default" href="https://nordic-getaways.com/" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.png" type="image/png" />

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: https://*.supabase.co https://*.tile.openstreetmap.org https://www.openstreetmap.org https://storage.googleapis.com https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://api.exchangerate-api.com https://nominatim.openstreetmap.org https://api.openrouteservice.org https://cdn.jsdelivr.net https://api.stripe.com; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; frame-src 'self' https://*.supabase.co https://checkout.stripe.com https://js.stripe.com;" />

    <!-- Performance: DNS prefetch and preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.supabase.co">
    <link rel="dns-prefetch" href="https://nominatim.openstreetmap.org">

    <!-- Fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Organization Schema (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Nordic Getaways",
      "url": "https://nordic-getaways.com",
      "logo": "https://nordic-getaways.com/favicon.png",
      "description": "Premium Nordic vacation rentals across Sweden, Norway, Finland, and Denmark.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "info@nordic-getaways.com",
        "availableLanguage": ["English", "Swedish", "Norwegian", "Danish", "Finnish", "German"]
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "SE"
      },
      "areaServed": [
        { "@type": "Country", "name": "Sweden" },
        { "@type": "Country", "name": "Norway" },
        { "@type": "Country", "name": "Finland" },
        { "@type": "Country", "name": "Denmark" }
      ]
    }
    </script>

    <!-- WebSite Schema with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Nordic Getaways",
      "url": "https://nordic-getaways.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://nordic-getaways.com/?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
