name: Deploy Pipeline

# Vercel auto-deploys on push to main. This workflow verifies the build.

on:
  push:
    branches: [ main ]

env:
  VITE_SUPABASE_URL: https://placeholder.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-key
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build the project (Next.js)
        run: npm run build

      - name: Deployment summary
        if: success()
        run: echo "Build verified. Vercel will auto-deploy this commit."
