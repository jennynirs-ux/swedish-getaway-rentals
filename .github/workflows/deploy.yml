name: Deploy Pipeline

# Lovable handles deployment automatically.
# This workflow just verifies the build passes.

on:
  push:
    branches: [ main ]

env:
  VITE_SUPABASE_URL: https://placeholder.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-key

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: echo "Tests passed. Lovable will auto-deploy."
