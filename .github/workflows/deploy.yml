name: Deploy Pipeline

# Deployment is handled by Vercel's Git integration (auto-deploys on push to main).
# This workflow runs a post-deploy verification check.
# To enable manual Vercel deploys via GitHub Actions, set these repository secrets:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

on:
  push:
    branches: [ main ]

env:
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'placeholder-key' }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'placeholder-key' }}

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Build the project (Next.js)
        run: npm run build

      - name: Deployment summary
        if: success()
        run: |
          echo "Build verified successfully!"
          echo "Vercel will auto-deploy this commit to production."
