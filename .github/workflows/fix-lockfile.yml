name: Regenerate package-lock.json

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show npm and node versions
        run: |
          node --version
          npm --version

      - name: Regenerate lockfile
        run: |
          rm -f package-lock.json bun.lockb bun.lock
          npm install --package-lock-only
          echo "Lockfile regenerated"

      - name: Verify npm ci works
        run: npm ci

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git rm --cached bun.lockb bun.lock 2>/dev/null || true
          git diff --cached --quiet || git commit -m "fix: regenerate package-lock.json, remove bun lockfiles"
          git push
